apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${PREFIX}-frontend
  namespace: ${NAMESPACE}
  labels:
    app: ${PREFIX}-frontend
spec:
  replicas: ${FRONTEND_REPLICAS}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: ${PREFIX}-frontend
  template:
    metadata:
      labels:
        app: ${PREFIX}-frontend
    spec:
      containers:
        - name: frontend
          image: "${ACR_SERVER}/${PREFIX}-frontend:${IMAGE_TAG}"
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: ${FRONTEND_CPU_REQUEST}
              memory: ${FRONTEND_MEMORY_REQUEST}
            limits:
              cpu: ${FRONTEND_CPU}
              memory: ${FRONTEND_MEMORY}
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 60
          startupProbe:
            httpGet:
              path: /health
              port: 80
            failureThreshold: 6
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ${PREFIX}-frontend
  namespace: ${NAMESPACE}
spec:
  selector:
    app: ${PREFIX}-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
