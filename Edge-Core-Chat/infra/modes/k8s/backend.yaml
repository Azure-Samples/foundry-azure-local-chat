apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${PREFIX}-server
  namespace: ${NAMESPACE}
  labels:
    app: ${PREFIX}-server
spec:
  replicas: ${BACKEND_REPLICAS}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: ${PREFIX}-server
  template:
    metadata:
      labels:
        app: ${PREFIX}-server
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: ${PREFIX}-backend-sa
      containers:
        - name: server
          image: "${ACR_SERVER}/${PREFIX}-server:${IMAGE_TAG}"
          ports:
            - containerPort: 3001
          env:
            # ── Server config ──
            - name: NODE_ENV
              value: "production"
            - name: SERVER_PORT
              value: "3001"
            # ── App settings (runtime only — not used by Bicep) ──
            - name: DATASOURCES
              value: "${DATASOURCES}"
            - name: STREAMING
              value: "${STREAMING}"
            - name: AI_PROJECT_ENDPOINT  # also in main.parameters.json for conditional RBAC
              value: "${AI_PROJECT_ENDPOINT}"
            - name: AI_AGENT_ID          # runtime only — Bicep doesn't need this
              value: "${AI_AGENT_ID}"
            - name: CORS_ORIGINS
              value: "${CORS_ORIGINS}"
            - name: ENABLE_ADMIN_ROUTES
              value: "${ENABLE_ADMIN_ROUTES}"
          resources:
            requests:
              cpu: ${BACKEND_CPU_REQUEST}
              memory: ${BACKEND_MEMORY_REQUEST}
            limits:
              cpu: ${BACKEND_CPU}
              memory: ${BACKEND_MEMORY}
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 60
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            failureThreshold: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ${PREFIX}-server
  namespace: ${NAMESPACE}
spec:
  selector:
    app: ${PREFIX}-server
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
