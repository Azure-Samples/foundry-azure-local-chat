# This workflow provisions and deploys the application to Azure using the Azure Developer CLI (azd).
# It is triggered manually via workflow_dispatch. Optionally, uncomment the push trigger to auto-deploy.
#
# Prerequisites:
#   Run `azd pipeline config` to configure the GitHub repository with the required
#   variables, secrets, and federated credentials for OIDC authentication.
#   See: https://learn.microsoft.com/azure/developer/azure-developer-cli/configure-devops-pipeline?tabs=GitHub

name: Deploy to Azure

on:
  workflow_dispatch:
  # Uncomment the lines below to automatically deploy on every push to main
  # push:
  #   branches:
  #     - main

# Set up permissions for deploying with secretless Azure federated credentials (OIDC)
# https://learn.microsoft.com/en-us/azure/developer/github/connect-from-azure?tabs=azure-portal%2Clinux#set-up-azure-login-with-openid-connect-authentication
permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Azure authentication — required, configured by `azd pipeline config`
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}

      # Infrastructure sizing — AKS cluster configuration
      NODE_COUNT: ${{ vars.NODE_COUNT }}
      VM_SIZE: ${{ vars.VM_SIZE }}

      # Deployment scope — controls which components are deployed (all | backend | frontend)
      DEPLOY_SCOPE: ${{ vars.DEPLOY_SCOPE }}

      # AI configuration — controls AI Foundry integration mode (create | byo | mock)
      AI_MODE: ${{ vars.AI_MODE }}
      # Required when AI_MODE=create — model deployment settings
      AI_MODEL_NAME: ${{ vars.AI_MODEL_NAME }}
      AI_MODEL_VERSION: ${{ vars.AI_MODEL_VERSION }}
      AI_MODEL_CAPACITY: ${{ vars.AI_MODEL_CAPACITY }}
      # Required when AI_MODE=byo — bring-your-own AI Foundry project
      AI_PROJECT_ENDPOINT: ${{ vars.AI_PROJECT_ENDPOINT }}
      AI_AGENT_ID: ${{ vars.AI_AGENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2.0.0

      # Authenticate using OpenID Connect (OIDC) federated credentials — no secrets needed
      - name: Log in with Azure (Federated Credentials)
        run: |
          azd auth login `
            --client-id "$Env:AZURE_CLIENT_ID" `
            --federated-credential-provider "github" `
            --tenant-id "$Env:AZURE_TENANT_ID"
        shell: pwsh

      # Provision Azure resources defined in /infra (AKS, ACR, AI Foundry, etc.)
      - name: Provision Infrastructure
        run: azd provision --no-prompt
        env:
          AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ secrets.AZD_INITIAL_ENVIRONMENT_CONFIG }}

      # Build and deploy application to the provisioned infrastructure
      - name: Deploy Application
        run: azd deploy --no-prompt
